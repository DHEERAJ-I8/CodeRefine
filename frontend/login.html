<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeRefine — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#05060f;
  --bg2:#0a0d1f;
  --card:#0e1326;
  --border:#1a2340;
  --accent:#4f8ef7;
  --accent2:#7c3aed;
  --green:#10b981;
  --red:#ef4444;
  --text:#e8edf5;
  --sub:#6b7fa3;
  --muted:#2d3a55;
  --input:#080c1a;
  --r:14px;
}

html,body{height:100%;overflow:hidden;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── 3D Canvas ── */
#bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ── Floating particles ── */
.particles{
  position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;
}
.particle{
  position:absolute;border-radius:50%;
  animation:float-up linear infinite;
  opacity:0;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.3;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* ── Grid overlay ── */
.grid-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}

/* ── Glow orbs ── */
.orb{
  position:fixed;border-radius:50%;filter:blur(80px);
  pointer-events:none;z-index:1;
  animation:orb-drift ease-in-out infinite alternate;
}
.orb1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(79,142,247,0.12),transparent 70%);
  top:-150px;left:-100px;
  animation-duration:8s;
}
.orb2{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(124,58,237,0.1),transparent 70%);
  bottom:-100px;right:-80px;
  animation-duration:11s;animation-delay:-3s;
}
.orb3{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(16,185,129,0.07),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation-duration:14s;animation-delay:-6s;
}
@keyframes orb-drift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(30px,20px) scale(1.05);}
}

/* ── Wrap ── */
.wrap{
  width:100%;max-width:440px;
  padding:20px;
  position:relative;z-index:10;
}

/* ── Logo ── */
.logo{
  display:flex;align-items:center;gap:14px;
  justify-content:center;
  margin-bottom:32px;
  animation:logo-in 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes logo-in{
  from{opacity:0;transform:translateY(-20px) scale(0.9);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.logo-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 0 40px rgba(79,142,247,0.35),0 4px 20px rgba(0,0,0,0.4);
  position:relative;
  animation:icon-glow 3s ease-in-out infinite alternate;
}
@keyframes icon-glow{
  from{box-shadow:0 0 30px rgba(79,142,247,0.3),0 4px 20px rgba(0,0,0,0.4);}
  to{box-shadow:0 0 60px rgba(124,58,237,0.45),0 4px 20px rgba(0,0,0,0.4);}
}
.logo-icon::after{
  content:'';
  position:absolute;inset:-1px;
  border-radius:15px;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent 60%);
}
.logo-text{font-size:24px;font-weight:700;letter-spacing:-0.02em;}
.logo-sub{font-size:11px;color:var(--sub);font-weight:400;letter-spacing:0.08em;text-transform:uppercase;}

/* ── Card with 3D perspective ── */
.card-scene{
  perspective:1200px;
  animation:card-in 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(30px) rotateX(8deg) scale(0.96);}
  to{opacity:1;transform:translateY(0) rotateX(0) scale(1);}
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.05);
  transform-style:preserve-3d;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  position:relative;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,142,247,0.5),rgba(124,58,237,0.5),transparent);
}

/* ── Scanline shimmer ── */
.card::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.008) 2px,
    rgba(255,255,255,0.008) 4px
  );
  pointer-events:none;border-radius:var(--r);
}

/* ── Tab switcher ── */
.tabs{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--border);
  position:relative;
}
.tab-indicator{
  position:absolute;bottom:0;left:0;width:50%;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:1px;
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  box-shadow:0 0 12px rgba(79,142,247,0.6);
}
.tab{
  padding:16px;text-align:center;
  font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;
  transition:color 0.2s;letter-spacing:0.04em;
  position:relative;z-index:1;
}
.tab:hover{color:var(--sub);}
.tab.active{color:var(--accent);}

/* ── Form body ── */
.form-body{padding:30px;}

.field{margin-bottom:20px;}
.field label{
  display:block;font-size:10px;font-weight:700;
  color:var(--sub);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:8px;
}

/* Input wrapper with animated border */
.input-wrap{position:relative;}
.input-wrap::before{
  content:'';
  position:absolute;inset:-1px;
  border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:0;
  transition:opacity 0.3s;
  z-index:0;
}
.input-wrap:focus-within::before{opacity:1;}

.field input{
  width:100%;
  background:var(--input);
  border:1px solid var(--border);
  color:var(--text);
  padding:12px 16px;
  border-radius:8px;
  font-size:13px;
  font-family:'Inter',sans-serif;
  outline:none;
  position:relative;z-index:1;
  transition:border-color 0.2s, background 0.2s;
}
.input-wrap:focus-within .field-input{
  border-color:transparent;
  background:#0b0f20;
}
.field input::placeholder{color:var(--muted);}
.field input:focus{border-color:transparent;background:#0b0f20;}

/* Password wrapper */
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:16px;transition:color .15s;padding:2px;z-index:2;
}
.pw-toggle:hover{color:var(--sub);}

/* ── Submit button ── */
.btn-submit{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:9px;
  color:#fff;font-size:13px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;letter-spacing:0.04em;
  transition:all .25s;
  margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(79,142,247,0.25);
}
.btn-submit::before{
  content:'';
  position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
  transition:left 0.5s;
}
.btn-submit:hover::before{left:100%;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,142,247,0.4);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ── Spinner ── */
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Message ── */
.msg{
  margin-top:14px;padding:11px 14px;
  border-radius:8px;font-size:12px;font-weight:500;
  display:none;align-items:center;gap:8px;
  animation:msg-in 0.3s ease both;
}
@keyframes msg-in{
  from{opacity:0;transform:translateY(-6px);}
  to{opacity:1;transform:translateY(0);}
}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;display:flex;}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;display:flex;}

/* ── Password strength ── */
.strength-bar{
  height:3px;
  background:var(--border);
  border-radius:2px;
  margin-top:7px;
  overflow:hidden;
}
.strength-fill{
  height:100%;width:0%;border-radius:2px;
  transition:width .3s ease,background .3s ease;
}

/* ── Form panels ── */
.form-panel{display:none;}
.form-panel.active{display:block;}

/* ── Card footer ── */
.card-footer{
  padding:13px 28px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:6px;
  letter-spacing:0.02em;
}
.card-footer .lock-icon{color:var(--green);font-size:13px;}

/* ── Floating code snippets ── */
.code-float{
  position:fixed;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:rgba(79,142,247,0.15);
  pointer-events:none;z-index:2;
  white-space:nowrap;
  animation:code-drift linear infinite;
  user-select:none;
}
@keyframes code-drift{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  5%{opacity:1;}
  95%{opacity:0.5;}
  100%{transform:translateY(-100px) translateX(20px);opacity:0;}
}

/* ── Hex grid corners ── */
.corner{
  position:fixed;z-index:2;pointer-events:none;
  opacity:0.15;
}
.corner svg{display:block;}
.corner-tl{top:20px;left:20px;}
.corner-br{bottom:20px;right:20px;transform:rotate(180deg);}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>

<!-- Decorative corner brackets -->
<div class="corner corner-tl">
  <svg width="60" height="60" viewBox="0 0 60 60" fill="none" stroke="rgba(79,142,247,0.8)" stroke-width="1.5">
    <path d="M0 30 L0 0 L30 0"/>
    <circle cx="0" cy="0" r="3" fill="rgba(79,142,247,0.8)"/>
  </svg>
</div>
<div class="corner corner-br">
  <svg width="60" height="60" viewBox="0 0 60 60" fill="none" stroke="rgba(124,58,237,0.8)" stroke-width="1.5">
    <path d="M0 30 L0 0 L30 0"/>
    <circle cx="0" cy="0" r="3" fill="rgba(124,58,237,0.8)"/>
  </svg>
</div>

<!-- Floating code strings -->
<div class="code-float" style="left:5%;bottom:-20px;animation-duration:12s;animation-delay:0s;">const auth = await verify(token);</div>
<div class="code-float" style="left:60%;bottom:-20px;animation-duration:15s;animation-delay:-4s;">import { jwt } from 'fastapi'</div>
<div class="code-float" style="left:25%;bottom:-20px;animation-duration:18s;animation-delay:-8s;">def analyze_code(src: str) -> Report:</div>
<div class="code-float" style="left:80%;bottom:-20px;animation-duration:10s;animation-delay:-2s;">score: 98 // optimized</div>
<div class="code-float" style="left:45%;bottom:-20px;animation-duration:14s;animation-delay:-6s;">Bearer eyJhbGciOiJIUzI1NiJ9...</div>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">CodeRefine</div>
      <div class="logo-sub">AI Code Review Engine</div>
    </div>
  </div>

  <div class="card-scene">
    <div class="card" id="main-card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- LOGIN -->
      <div class="form-panel active" id="panel-login">
        <div class="form-body">
          <div class="field">
            <label>Username</label>
            <div class="input-wrap">
              <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="input-wrap pw-wrap">
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
              <button class="pw-toggle" type="button" onclick="togglePw('login-password',this)">👁</button>
            </div>
          </div>
          <button class="btn-submit" id="login-btn" onclick="doLogin()">
            <div class="spinner" id="login-spinner"></div>
            <span id="login-label">Sign In →</span>
          </button>
          <div class="msg" id="login-msg"></div>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="form-panel" id="panel-register">
        <div class="form-body">
          <div class="field">
            <label>Username</label>
            <div class="input-wrap">
              <input type="text" id="reg-username" placeholder="choose_a_username" autocomplete="username"/>
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="input-wrap pw-wrap">
              <input type="password" id="reg-password" placeholder="min. 6 characters"
                autocomplete="new-password" oninput="checkStrength(this.value)"/>
              <button class="pw-toggle" type="button" onclick="togglePw('reg-password',this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          </div>
          <button class="btn-submit" id="reg-btn" onclick="doRegister()">
            <div class="spinner" id="reg-spinner"></div>
            <span id="reg-label">Create Account →</span>
          </button>
          <div class="msg" id="reg-msg"></div>
        </div>
      </div>

      <div class="card-footer">
        <span class="lock-icon">🔒</span>
        API keys stored server-side — never exposed to the browser.
      </div>
    </div>
  </div>
</div>

<script>
// ── Config: base URL from localStorage (set in settings) or default ──
const BASE = localStorage.getItem('backendUrl') || 'http://localhost:8000';

// ── Redirect if already logged in ──
if (localStorage.getItem('token')) {
  window.location.href = 'index.html';
}

// ══════════════════════════════════════════
// 3D CANVAS — Rotating wireframe sphere
// ══════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, angle = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function project(x, y, z, cx, cy) {
  const fov = 500;
  const scale = fov / (fov + z);
  return { x: cx + x * scale, y: cy + y * scale, s: scale };
}

function drawSphere() {
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.38;
  const rings = 10, pts = 28;

  ctx.lineWidth = 0.5;

  for (let r = 0; r < rings; r++) {
    const phi = (r / rings) * Math.PI;
    const y3  = R * Math.cos(phi);
    const rr  = R * Math.sin(phi);

    const points = [];
    for (let p = 0; p <= pts; p++) {
      const theta = (p / pts) * Math.PI * 2 + angle;
      const x3 = rr * Math.cos(theta);
      const z3 = rr * Math.sin(theta);
      points.push(project(x3, y3, z3, cx, cy));
    }

    ctx.beginPath();
    points.forEach((pt, i) => {
      const alpha = Math.max(0, (pt.s - 0.7) / 0.5) * 0.15;
      if (i === 0) { ctx.moveTo(pt.x, pt.y); }
      else { ctx.lineTo(pt.x, pt.y); }
    });
    ctx.strokeStyle = `rgba(79,142,247,0.08)`;
    ctx.stroke();
  }

  // Vertical lines
  for (let p = 0; p < pts; p++) {
    const theta = (p / pts) * Math.PI * 2 + angle;
    ctx.beginPath();
    for (let r = 0; r <= rings; r++) {
      const phi = (r / rings) * Math.PI;
      const y3 = R * Math.cos(phi);
      const rr = R * Math.sin(phi);
      const x3 = rr * Math.cos(theta);
      const z3 = rr * Math.sin(theta);
      const pt = project(x3, y3, z3, cx, cy);
      if (r === 0) ctx.moveTo(pt.x, pt.y);
      else ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = `rgba(124,58,237,0.06)`;
    ctx.stroke();
  }

  angle += 0.003;
  requestAnimationFrame(drawSphere);
}
drawSphere();

// ── Particles ──
const container = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random() * 100}%;
    background:${Math.random() > 0.5 ? '#4f8ef7' : '#7c3aed'};
    animation-duration:${8 + Math.random() * 12}s;
    animation-delay:-${Math.random() * 15}s;
    filter:blur(${size > 2 ? 1 : 0}px);
  `;
  container.appendChild(p);
}

// ── 3D card tilt on mouse ──
const card = document.getElementById('main-card');
document.addEventListener('mousemove', (e) => {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = (e.clientX - cx) / (window.innerWidth  / 2);
  const dy = (e.clientY - cy) / (window.innerHeight / 2);
  const maxTilt = 6;
  card.style.transform = `rotateY(${dx * maxTilt}deg) rotateX(${-dy * maxTilt}deg)`;
});
document.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateY(0) rotateX(0)';
});

// ══════════════════════════════════════════
// AUTH LOGIC
// ══════════════════════════════════════════
function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('tab-indicator').style.transform =
    tab === 'register' ? 'translateX(100%)' : 'translateX(0)';
  clearMessages();
}

function clearMessages() {
  ['login-msg','reg-msg'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(btnId, spinnerId, labelId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinnerId).style.display = loading ? 'flex' : 'none';
  document.getElementById(labelId).style.display   = loading ? 'none' : 'inline';
}

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  input.type  = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

function checkStrength(pw) {
  const fill  = document.getElementById('strength-fill');
  let score   = 0;
  if (pw.length >= 6)           score++;
  if (pw.length >= 10)          score++;
  if (/[A-Z]/.test(pw))        score++;
  if (/[0-9]/.test(pw))        score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct   = (score / 5) * 100;
  const color = score <= 1 ? '#ef4444' : score <= 3 ? '#f59e0b' : '#10b981';
  fill.style.width      = pct + '%';
  fill.style.background = color;
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) {
    showMsg('login-msg', '⚠ Please fill in both fields.', 'error');
    return;
  }
  setLoading('login-btn', 'login-spinner', 'login-label', true);
  try {
    const res  = await fetch(BASE + '/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg('login-msg', '✗ ' + (data.detail || 'Login failed.'), 'error');
      return;
    }
    localStorage.setItem('token',       data.access_token);
    localStorage.setItem('cr_username', username);
    showMsg('login-msg', '✓ Signed in! Redirecting…', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  } catch {
    showMsg('login-msg', '✗ Cannot reach server. Is the backend running?', 'error');
  } finally {
    setLoading('login-btn', 'login-spinner', 'login-label', false);
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !password) {
    showMsg('reg-msg', '⚠ Please fill in both fields.', 'error');
    return;
  }
  if (password.length < 6) {
    showMsg('reg-msg', '⚠ Password must be at least 6 characters.', 'error');
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) {
    showMsg('reg-msg', '⚠ Username: letters, numbers, and underscores only.', 'error');
    return;
  }
  setLoading('reg-btn', 'reg-spinner', 'reg-label', true);
  try {
    const res  = await fetch(BASE + '/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg('reg-msg', '✗ ' + (data.detail || 'Registration failed.'), 'error');
      return;
    }
    showMsg('reg-msg', '✓ Account created! Signing you in…', 'success');
    setTimeout(async () => {
      const lr   = await fetch(BASE + '/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password })
      });
      const ld = await lr.json();
      if (lr.ok) {
        localStorage.setItem('token',       ld.access_token);
        localStorage.setItem('cr_username', username);
        window.location.href = 'index.html';
      } else {
        switchTab('login');
      }
    }, 900);
  } catch {
    showMsg('reg-msg', '✗ Cannot reach server. Is the backend running?', 'error');
  } finally {
    setLoading('reg-btn', 'reg-spinner', 'reg-label', false);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('panel-login').classList.contains('active');
  if (loginActive) doLogin(); else doRegister();
});
</script>
</body>
